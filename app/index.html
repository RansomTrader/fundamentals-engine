<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#F6F5F1" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#10161C" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>fundamentals-engine</title>
<style>
:root {
  --paper:#F6F5F1; --card:#FFFFFF; --ink:#131C24; --muted:#66707A;
  --accent:#0B5FA5; --accent-soft:#E9F1F8; --rule:#E4E1D9;
  --good:#1E7A54; --bad:#B5402F;
  --chart-grid:#EDEAE2; --chart-text:#8A939C; --chart-zero:#C4BEB2;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --serif:Georgia,'Times New Roman',serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper:#10161C; --card:#161E26; --ink:#E7EBEF; --muted:#8C97A1;
    --accent:#4C9FE0; --accent-soft:#15293A; --rule:#232D36;
    --good:#4CC38A; --bad:#E0715C;
    --chart-grid:#232D36; --chart-text:#7C8791; --chart-zero:#48535D;
  }
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body { margin:0; background:var(--paper); color:var(--ink); font:15px/1.55 var(--serif); }
.wrap { max-width:1060px; margin:0 auto; padding:18px 16px 90px; }

header { display:flex; align-items:baseline; justify-content:space-between;
  gap:12px; padding-bottom:14px; border-bottom:2px solid var(--ink); }
.brand { font:700 19px var(--serif); letter-spacing:-.01em; }
.brand .dot { color:var(--accent); }
.hdr-meta { font:10px/1.4 var(--mono); color:var(--muted); text-align:right; }
.hdr-meta a { color:var(--accent); text-decoration:none; }

nav { display:flex; margin:14px 0 16px; border-bottom:1px solid var(--rule); }
nav button { appearance:none; background:none; border:0; padding:11px 14px 12px;
  font:600 11px/1 var(--mono); letter-spacing:.14em; text-transform:uppercase;
  color:var(--muted); cursor:pointer; border-bottom:2px solid transparent;
  margin-bottom:-1px; transition:color .15s, border-color .15s; }
nav button.active { color:var(--ink); border-bottom-color:var(--accent); }
nav button:active { color:var(--accent); }

.addrow { display:flex; gap:8px; margin-bottom:10px; }
.addrow input { flex:1; min-width:0; padding:12px 14px; border:1px solid var(--rule);
  border-radius:8px; background:var(--card); font:600 15px var(--mono);
  text-transform:uppercase; color:var(--ink); outline:none; transition:border-color .15s, box-shadow .15s; }
.addrow input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.addrow input::placeholder { color:#A8B0B8; font-weight:500; }
.addrow button { padding:12px 20px; border:0; border-radius:8px; background:var(--accent);
  color:#fff; font:600 12px/1 var(--mono); letter-spacing:.08em; cursor:pointer;
  transition:transform .1s, opacity .15s; }
.addrow button:active { transform:scale(.97); opacity:.9; }

.status { font:11px/1.5 var(--mono); color:var(--muted); min-height:17px; margin-bottom:8px; }
.status.err { color:var(--bad); }

.chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.chip { display:inline-flex; align-items:center; gap:7px; padding:8px 11px;
  border:1px solid var(--rule); border-radius:999px; background:var(--card);
  font:600 12px var(--mono); cursor:pointer; color:var(--muted);
  transition:all .15s; user-select:none; }
.chip.sel { color:var(--ink); border-color:var(--accent);
  background:var(--accent-soft); }
.chip:active { transform:scale(.96); }
.chip .x { color:#A8B0B8; padding:0 1px; font-size:11px; }
.chip .x:active { color:var(--bad); }

.view { animation:fade .2s ease; }
@keyframes fade { from { opacity:0; transform:translateY(4px); } }
@media (prefers-reduced-motion:reduce) { .view { animation:none; } }

.co-name { font:15px var(--serif); color:var(--muted); margin:2px 0 10px; }
.co-name b { color:var(--ink); }

.kpis { display:grid; grid-template-columns:repeat(auto-fill,minmax(118px,1fr));
  gap:8px; margin:0 0 20px; }
.kpi { background:var(--card); border:1px solid var(--rule); border-radius:10px;
  padding:11px 12px; }
.kpi-label { font:600 8.5px/1.3 var(--mono); letter-spacing:.11em;
  text-transform:uppercase; color:var(--muted); }
.kpi-value { font:700 17px/1.35 var(--mono); margin-top:5px; letter-spacing:-.01em; }
.neg { color:var(--bad); } .pos { color:var(--good); }

h2 { font:700 16px var(--serif); margin:22px 0 10px; display:flex;
  align-items:baseline; gap:8px; }
h2 small { font:500 10px var(--mono); letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.chartbox { background:var(--card); border:1px solid var(--rule); border-radius:10px;
  padding:12px 12px 8px; overflow:hidden; }
.chartbox h3 { margin:0 0 8px; font:600 9.5px/1 var(--mono); letter-spacing:.1em;
  text-transform:uppercase; color:var(--muted); display:flex; justify-content:space-between; }
.chartbox h3 .latest { color:var(--ink); letter-spacing:0; }

.tablewrap { overflow-x:auto; border:1px solid var(--rule); border-radius:10px;
  background:var(--card); }
table { width:100%; border-collapse:collapse; font-size:12.5px; }
th { text-align:left; font:600 8.5px/1.3 var(--mono); letter-spacing:.1em;
  text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--ink);
  padding:9px 10px; background:var(--card); }
td { border-bottom:1px solid var(--rule); padding:7px 10px; white-space:nowrap; }
tr:last-child td { border-bottom:0; }
td:first-child, th:first-child { position:sticky; left:0; background:var(--card);
  box-shadow:1px 0 0 var(--rule); }
td.num, th.num { font-family:var(--mono); text-align:right; font-size:12px; }
td.best { color:var(--good); font-weight:700; }

.selrow { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.selrow label { font:600 9px/1 var(--mono); letter-spacing:.12em;
  text-transform:uppercase; color:var(--muted); }
select { padding:9px 12px; border:1px solid var(--rule); border-radius:8px;
  background:var(--card); font:600 12.5px var(--mono); color:var(--ink); outline:none; }
select:focus { border-color:var(--accent); }

.empty { padding:36px 16px; border:1px dashed var(--rule); border-radius:10px;
  color:var(--muted); text-align:center; font-size:14px; background:var(--card); }
.dupont { display:flex; align-items:stretch; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.dp { flex:1 1 100px; background:var(--card); border:1px solid var(--rule);
  border-radius:10px; padding:10px 12px; min-width:96px; }
.dp.hero { border-color:var(--accent); background:var(--accent-soft); }
.dp-op { align-self:center; font:700 15px var(--mono); color:var(--muted); padding:0 1px; }
.grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.btn-ghost { appearance:none; border:1px solid var(--rule); background:none;
  border-radius:6px; color:var(--muted); font:600 9px var(--mono); letter-spacing:.08em;
  padding:4px 8px; cursor:pointer; text-transform:uppercase; }
.btn-ghost:active { color:var(--accent); border-color:var(--accent); }
.seg { display:inline-flex; border:1px solid var(--rule); border-radius:8px; overflow:hidden; }
.seg button { appearance:none; border:0; background:var(--card); color:var(--muted);
  font:600 10px var(--mono); letter-spacing:.08em; padding:8px 12px; cursor:pointer;
  text-transform:uppercase; }
.seg button.on { background:var(--accent); color:#fff; }
.scorebar { display:inline-flex; align-items:center; gap:6px; }
.scorebar i { display:inline-block; height:6px; border-radius:3px;
  background:var(--accent); }
tr.rowlink { cursor:pointer; }
tr.rowlink:active td { background:var(--accent-soft); }
@media (max-width:720px) { .grid { grid-template-columns:1fr; }
  .grid3 { grid-template-columns:1fr; } }
.note { font:10.5px/1.6 var(--mono); color:var(--muted); margin-top:8px; }
footer { margin-top:40px; font:9.5px/1.7 var(--mono); color:#9AA2AA; }
footer a { color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="brand">fundamentals<span class="dot">·</span>engine</div>
  <div class="hdr-meta">SEC EDGAR + yfinance<br>
    <a href="dashboard.html">static report</a> ·
    <a href="https://github.com/RansomTrader/fundamentals-engine/edit/main/universe.txt">universe.txt</a>
  </div>
</header>

<nav>
  <button id="tab-companies" class="active" onclick="showTab('companies')">Fundamentals</button>
  <button id="tab-market" onclick="showTab('market')">Market</button>
  <button id="tab-compare" onclick="showTab('compare')">Compare</button>
  <button id="tab-screen" onclick="showTab('screen')">Screen</button>
</nav>

<div class="addrow">
  <input id="ticker-input" placeholder="Add ticker — INTC, NVDA, MSTR…" maxlength="8"
         autocomplete="off" onkeydown="if(event.key==='Enter')addCompany()">
  <button onclick="addCompany()">Add</button>
</div>
<div id="status" class="status"></div>
<div id="chips" class="chips"></div>

<div id="view-companies" class="view"></div>
<div id="view-market" class="view" style="display:none"></div>
<div id="view-compare" class="view" style="display:none"></div>
<div id="view-screen" class="view" style="display:none"></div>

<footer>Fundamentals: SEC EDGAR companyfacts (10-K / 20-F, as filed), ratios computed
in-app · Market data: yfinance via daily CI build · Not investment advice ·
<a href="https://github.com/RansomTrader/fundamentals-engine">source</a></footer>
</div>

<script>
/* ---------- concept map (mirrors src/fundamentals/edgar.py) ---------- */
const CONCEPTS = {
  revenue: ["RevenueFromContractWithCustomerExcludingAssessedTax","Revenues","SalesRevenueNet"],
  cost_of_revenue: ["CostOfRevenue","CostOfGoodsAndServicesSold","CostOfGoodsSold"],
  gross_profit: ["GrossProfit"],
  operating_income: ["OperatingIncomeLoss"],
  net_income: ["NetIncomeLoss"],
  rnd_expense: ["ResearchAndDevelopmentExpense"],
  interest_expense: ["InterestExpense","InterestExpenseNonoperating","InterestExpenseDebt"],
  assets: ["Assets"], current_assets: ["AssetsCurrent"],
  current_liabilities: ["LiabilitiesCurrent"], inventory: ["InventoryNet"],
  equity: ["StockholdersEquity","StockholdersEquityIncludingPortionAttributableToNoncontrollingInterest"],
  total_debt_lt: ["LongTermDebtNoncurrent","LongTermDebt"],
  total_debt_st: ["LongTermDebtCurrent","DebtCurrent"],
  cash: ["CashAndCashEquivalentsAtCarryingValue"],
  operating_cash_flow: ["NetCashProvidedByUsedInOperatingActivities"],
  capex: ["PaymentsToAcquirePropertyPlantAndEquipment","PaymentsToAcquireProductiveAssets"],
  eps_diluted: ["EarningsPerShareDiluted","EarningsPerShareBasic"],
};
const INSTANT = new Set(["assets","current_assets","current_liabilities","inventory",
  "equity","total_debt_lt","total_debt_st","cash"]);
const ANNUAL_FORMS = new Set(["10-K","20-F"]);
const PCT = new Set(["gross_margin","operating_margin","net_margin","fcf_margin",
  "rnd_intensity","roe","roa","revenue_growth","net_income_growth"]);
const LOWER_BETTER = new Set(["debt_to_equity"]);
const METRICS = {
  gross_margin:"Gross margin", operating_margin:"Operating margin",
  net_margin:"Net margin", fcf_margin:"FCF margin", rnd_intensity:"R&D intensity",
  roe:"ROE", roa:"ROA", current_ratio:"Current ratio", quick_ratio:"Quick ratio",
  debt_to_equity:"Debt / equity", interest_coverage:"Interest coverage",
  equity_multiplier:"Equity multiplier",
  asset_turnover:"Asset turnover", revenue_growth:"Revenue growth YoY",
  net_income_growth:"Net income growth YoY", revenue:"Revenue",
  net_income:"Net income", free_cash_flow:"Free cash flow",
};
const PALETTE = ["#0B5FA5","#B5402F","#1E7A54","#8A6D1F","#5B4B8A","#1F7A8C","#7A4B2B","#4B5563"];

/* ---------- state ---------- */
let tickersMap = null;
let companies = loadState();
let selected = Object.keys(companies)[0] || null;
let compareMetric = "operating_margin";
let marketMode = "price";
let screenerData = null, screenSort = { key: "score", dir: -1 };
const marketCache = {};
const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

function loadState() {
  try { return JSON.parse(localStorage.getItem("fe_companies_v2")) || {}; }
  catch { return {}; }
}
function saveState() {
  try { localStorage.setItem("fe_companies_v2", JSON.stringify(companies)); } catch {}
}

/* ---------- fundamentals data ---------- */
async function loadTickerMap() {
  if (tickersMap) return tickersMap;
  const r = await fetch("tickers.json");
  if (!r.ok) throw new Error("ticker map missing — CI build may still be running");
  tickersMap = await r.json();
  return tickersMap;
}

function annualRecords(units, instant) {
  const out = [];
  for (const [unit, entries] of Object.entries(units || {})) {
    if (!["USD","shares","USD/shares"].includes(unit)) continue;
    for (const e of entries) {
      if (!ANNUAL_FORMS.has(e.form)) continue;
      if (instant) { if (e.fp !== "FY") continue; }
      else {
        if (!e.start || !e.end) continue;
        const days = (new Date(e.end) - new Date(e.start)) / 864e5;
        if (days < 340 || days > 380) continue;
      }
      if (e.fy == null) continue;
      out.push(e);
    }
  }
  return out;
}

function normalize(facts) {
  const gaap = (facts.facts || {})["us-gaap"] || {};
  const rows = {};
  for (const [metric, tags] of Object.entries(CONCEPTS)) {
    const instant = INSTANT.has(metric);
    for (const tag of tags) {
      if (!gaap[tag]) continue;
      const recs = annualRecords(gaap[tag].units, instant);
      if (!recs.length) continue;
      const byFy = {};
      recs.sort((a,b) => (a.filed||"").localeCompare(b.filed||""));
      for (const r of recs) byFy[r.fy] = r.val;
      for (const [fy, val] of Object.entries(byFy))
        (rows[fy] = rows[fy] || {})[metric] = val;
      break;
    }
  }
  return Object.entries(rows)
    .map(([fy, vals]) => ({ fiscal_year: +fy, ...vals }))
    .sort((a,b) => a.fiscal_year - b.fiscal_year);
}

const div = (a,b) => (a==null || b==null || b===0) ? null : a/b;

function computeRatios(rows) {
  let prev = null;
  for (const r of rows) {
    if (r.gross_profit == null && r.revenue != null && r.cost_of_revenue != null)
      r.gross_profit = r.revenue - r.cost_of_revenue;
    r.total_debt = (r.total_debt_lt ?? 0) + (r.total_debt_st ?? 0);
    if (r.total_debt_lt == null && r.total_debt_st == null) r.total_debt = null;
    r.free_cash_flow = (r.operating_cash_flow != null && r.capex != null)
      ? r.operating_cash_flow - r.capex : null;
    r.gross_margin = div(r.gross_profit, r.revenue);
    r.operating_margin = div(r.operating_income, r.revenue);
    r.net_margin = div(r.net_income, r.revenue);
    r.fcf_margin = div(r.free_cash_flow, r.revenue);
    r.rnd_intensity = div(r.rnd_expense, r.revenue);
    r.roe = div(r.net_income, r.equity);
    r.roa = div(r.net_income, r.assets);
    r.equity_multiplier = div(r.assets, r.equity);
    r.current_ratio = div(r.current_assets, r.current_liabilities);
    r.quick_ratio = div((r.current_assets != null)
      ? r.current_assets - (r.inventory ?? 0) : null, r.current_liabilities);
    r.debt_to_equity = div(r.total_debt, r.equity);
    r.interest_coverage = div(r.operating_income, r.interest_expense);
    r.asset_turnover = div(r.revenue, r.assets);
    r.revenue_growth = prev ? div(r.revenue != null && prev.revenue != null
      ? r.revenue - prev.revenue : null, prev.revenue) : null;
    r.net_income_growth = prev ? div(r.net_income != null && prev.net_income != null
      ? r.net_income - prev.net_income : null, prev.net_income) : null;
    prev = r;
  }
  return rows;
}

async function addCompany() {
  const input = document.getElementById("ticker-input");
  const t = input.value.trim().toUpperCase();
  if (!t) return;
  try {
    setStatus(`Loading ${t}…`);
    let entry = null;
    const pre = await fetch(`data/${t}.json`).catch(() => null);
    if (pre && pre.ok) {
      entry = await pre.json();
    } else {
      const map = await loadTickerMap();
      const meta = map[t];
      if (!meta) { setStatus(`${t} not found in SEC ticker list`, true); return; }
      setStatus(`${t} not prebuilt — fetching from EDGAR via relay…`);
      const cik = String(meta.cik).padStart(10, "0");
      const edgarUrl = `https://data.sec.gov/api/xbrl/companyfacts/CIK${cik}.json`;
      const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(edgarUrl)}`);
      if (!r.ok) throw new Error(`relay returned ${r.status}`);
      const rows = computeRatios(normalize(await r.json()));
      if (!rows.length) { setStatus(`${t}: no annual us-gaap data found`, true); return; }
      entry = { name: meta.name, rows: rows.slice(-8) };
    }
    if (!entry.rows || !entry.rows.length) { setStatus(`${t}: no data`, true); return; }
    companies[t] = entry;
    selected = t; saveState(); input.value = "";
    setStatus("");
    render();
  } catch (err) { setStatus(`${t}: ${err.message}`, true); }
}

function removeCompany(t, ev) {
  ev.stopPropagation();
  delete companies[t];
  if (selected === t) selected = Object.keys(companies)[0] || null;
  saveState(); render();
}

/* ---------- market data ---------- */
async function loadMarket(t) {
  if (marketCache[t]) return marketCache[t];
  let m = null;
  const pre = await fetch(`market/${t}.json`).catch(() => null);
  if (pre && pre.ok) {
    m = await pre.json();
  } else {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${t}?range=5y&interval=1wk`;
    const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
    if (!r.ok) throw new Error("market data unavailable");
    const j = await r.json();
    const res = j.chart && j.chart.result && j.chart.result[0];
    if (!res) throw new Error("market data unavailable");
    const closes = res.indicators.quote[0].close;
    m = {
      price: res.meta.regularMarketPrice,
      market_cap: null, year_high: null, year_low: null,
      history: (res.timestamp || []).map((ts, i) => [ts * 1000, closes[i]])
        .filter(p => p[1] != null),
      asof: new Date().toISOString().slice(0, 10),
    };
  }
  marketCache[t] = m;
  return m;
}

/* ---------- formatting ---------- */
function fmt(v, metric) {
  if (v == null || Number.isNaN(v)) return "—";
  if (PCT.has(metric)) return (v*100).toFixed(1) + "%";
  const a = Math.abs(v);
  if (a >= 1e12) return "$" + (v/1e12).toFixed(2) + "T";
  if (a >= 1e9) return "$" + (v/1e9).toFixed(1) + "B";
  if (a >= 1e6) return "$" + (v/1e6).toFixed(0) + "M";
  return v.toFixed(2);
}
function signed(v, metric) {
  const cls = (v != null && PCT.has(metric)) ? (v < 0 ? "neg" : "") : "";
  return `<span class="${cls}">${fmt(v, metric)}</span>`;
}
function money(v, dec = 2) {
  if (v == null || Number.isNaN(v)) return "—";
  const a = Math.abs(v);
  if (a >= 1e12) return "$" + (v/1e12).toFixed(2) + "T";
  if (a >= 1e9) return "$" + (v/1e9).toFixed(1) + "B";
  return "$" + v.toFixed(dec);
}
function fmtAxis(v, pct) {
  if (pct) return v.toFixed(0) + "%";
  const a = Math.abs(v);
  if (a >= 1e9) return (v/1e9).toFixed(0) + "B";
  if (a >= 1e6) return (v/1e6).toFixed(0) + "M";
  return v.toFixed(a < 10 ? 1 : 0);
}
function setStatus(msg, err) {
  const el = document.getElementById("status");
  el.textContent = msg; el.className = "status" + (err ? " err" : "");
}

/* ---------- SVG charts ---------- */
function lineChart(id, labels, datasets, pct, opts = {}) {
  const el = document.getElementById(id);
  if (!el) return;
  const hasLegend = datasets.length > 1;
  const W = el.clientWidth || 320;
  const H = (opts.height || el.clientHeight || 190) - (hasLegend ? 16 : 0);
  const padL = 46, padR = 10, padT = 8, padB = 20;
  const vals = datasets.flatMap(d => d.data).filter(v => v != null && isFinite(v));
  if (!vals.length) {
    el.innerHTML = '<div class="note" style="padding:20px 0">no data</div>';
    return;
  }
  let min = Math.min(...vals), max = Math.max(...vals);
  if (min === max) { min -= 1; max += 1; }
  const span = max - min; min -= span * 0.08; max += span * 0.08;
  const x = i => padL + (labels.length < 2 ? (W - padL - padR) / 2
    : i * (W - padL - padR) / (labels.length - 1));
  const y = v => padT + (max - v) * (H - padT - padB) / (max - min);
  let svg = "";
  for (let k = 0; k < 4; k++) {
    const tv = min + (max - min) * k / 3, ty = y(tv);
    svg += `<line x1="${padL}" y1="${ty}" x2="${W - padR}" y2="${ty}" stroke="var(--chart-grid)"/>`;
    svg += `<text x="${padL - 6}" y="${ty + 3}" text-anchor="end" font-size="9"
      font-family="ui-monospace,Menlo,monospace" fill="var(--chart-text)">${opts.money ? fmtAxis(tv, false) : fmtAxis(tv, pct)}</text>`;
  }
  if (min < 0 && max > 0)
    svg += `<line x1="${padL}" y1="${y(0)}" x2="${W - padR}" y2="${y(0)}" stroke="var(--chart-zero)"/>`;
  const step = Math.ceil(labels.length / (opts.maxLabels || 8));
  labels.forEach((lab, i) => {
    if (i % step) return;
    svg += `<text x="${x(i)}" y="${H - 5}" text-anchor="middle" font-size="9"
      font-family="ui-monospace,Menlo,monospace" fill="var(--chart-text)">${lab}</text>`;
  });
  for (const d of datasets) {
    if (d.fill) {
      let area = "", started = false, lastX = null;
      d.data.forEach((v, i) => {
        if (v == null || !isFinite(v)) return;
        area += (started ? "L" : "M") + x(i).toFixed(1) + " " + y(v).toFixed(1);
        started = true; lastX = x(i);
      });
      if (started) {
        const firstX = x(d.data.findIndex(v => v != null && isFinite(v)));
        svg += `<path d="${area}L${lastX.toFixed(1)} ${y(min).toFixed(1)}L${firstX.toFixed(1)} ${y(min).toFixed(1)}Z"
          fill="${d.color}" opacity="0.08"/>`;
      }
    }
    let path = "", started = false;
    d.data.forEach((v, i) => {
      if (v == null || !isFinite(v)) { started = false; return; }
      path += (started ? "L" : "M") + x(i).toFixed(1) + " " + y(v).toFixed(1);
      started = true;
    });
    svg += `<path d="${path}" fill="none" stroke="${d.color}" stroke-width="2"
      stroke-linejoin="round"/>`;
    if (!opts.noDots)
      d.data.forEach((v, i) => {
        if (v != null && isFinite(v))
          svg += `<circle cx="${x(i)}" cy="${y(v)}" r="2.5" fill="${d.color}"/>`;
      });
  }
  const legend = hasLegend
    ? `<div style="display:flex;gap:10px;flex-wrap:wrap;font:9px ui-monospace,Menlo,monospace;
        color:#66707A">${datasets.map(d =>
        `<span><span style="color:${d.color}">&#9679;</span> ${d.label}</span>`).join("")}</div>`
    : "";
  el.innerHTML = `<svg width="${W}" height="${H}">${svg}</svg>${legend}`;
}

/* ---------- extra charts + exports ---------- */
function stackedChart(id, labels, layers) {
  // layers: [{label, color, data (0..1 fractions)}] -> cumulative % areas
  const el = document.getElementById(id);
  if (!el) return;
  const W = el.clientWidth || 320, H = (el.clientHeight || 190) - 16;
  const padL = 40, padR = 10, padT = 8, padB = 20;
  const n = labels.length;
  const x = i => padL + (n < 2 ? (W-padL-padR)/2 : i * (W-padL-padR)/(n-1));
  const y = v => padT + (1 - Math.min(v, 1)) * (H - padT - padB);
  let svg = "";
  for (const g of [0, .25, .5, .75, 1]) {
    svg += `<line x1="${padL}" y1="${y(g)}" x2="${W-padR}" y2="${y(g)}" stroke="var(--chart-grid)"/>`;
    svg += `<text x="${padL-5}" y="${y(g)+3}" text-anchor="end" font-size="9"
      font-family="ui-monospace,Menlo,monospace" fill="var(--chart-text)">${g*100}%</text>`;
  }
  const step = Math.ceil(n / 8);
  labels.forEach((lab, i) => { if (i % step) return;
    svg += `<text x="${x(i)}" y="${H-5}" text-anchor="middle" font-size="9"
      font-family="ui-monospace,Menlo,monospace" fill="var(--chart-text)">${lab}</text>`; });
  const base = labels.map(() => 0);
  for (const layer of layers) {
    const top = base.map((b, i) => b + (layer.data[i] ?? 0));
    let d = "";
    top.forEach((v, i) => { d += (i ? "L" : "M") + x(i).toFixed(1) + " " + y(v).toFixed(1); });
    for (let i = n - 1; i >= 0; i--) d += "L" + x(i).toFixed(1) + " " + y(base[i]).toFixed(1);
    svg += `<path d="${d}Z" fill="${layer.color}" opacity="0.75"/>`;
    top.forEach((v, i) => base[i] = v);
  }
  const legend = `<div style="display:flex;gap:10px;flex-wrap:wrap;font:9px ui-monospace,Menlo,monospace;
    color:var(--muted)">${layers.map(l =>
    `<span><span style="color:${l.color}">&#9632;</span> ${l.label}</span>`).join("")}</div>`;
  el.innerHTML = `<svg width="${W}" height="${H}">${svg}</svg>${legend}`;
}

function movingAvg(arr, w) {
  return arr.map((_, i) => {
    if (i < w - 1) return null;
    let sum = 0;
    for (let k = i - w + 1; k <= i; k++) sum += arr[k];
    return sum / w;
  });
}

function download(blob, filename) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 800);
}
function exportCSV(filename, rows) {
  const esc = v => { v = v == null ? "" : String(v);
    return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
  download(new Blob([rows.map(r => r.map(esc).join(",")).join("\n")],
    { type: "text/csv" }), filename);
}
function exportPNG(boxId, filename) {
  const svg = document.querySelector(`#${boxId} svg`);
  if (!svg) return;
  const w = svg.width.baseVal.value, h = svg.height.baseVal.value;
  const xml = new XMLSerializer().serializeToString(svg)
    .replace("<svg", `<svg xmlns="http://www.w3.org/2000/svg"`)
    .replace(/var\(--chart-grid\)/g, "#E5E1D8").replace(/var\(--chart-text\)/g, "#8A939C")
    .replace(/var\(--chart-zero\)/g, "#C4BEB2");
  const img = new Image();
  img.onload = () => {
    const c = document.createElement("canvas");
    c.width = w * 2; c.height = h * 2;
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, c.width, c.height);
    ctx.scale(2, 2); ctx.drawImage(img, 0, 0);
    c.toBlob(b => b && download(b, filename), "image/png");
  };
  img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(xml)));
}
window.exportCSV = exportCSV; window.exportPNG = exportPNG;

      `<div class="kpi"><div class="kpi-label">${l}</div>

    <div class="selrow">
      <div class="seg">

      </span></h3>
      <div style="height:250px" id="mkt-chart"></div></div>

      `fundamentals — a deliberate simplification. 50-week moving average overlaid. ` +
      `Prices refresh each weekday after US close via CI.`;

    const sets = [{ label: selected, color: cssVar("--accent"), fill: true, data: closes }];

      { height: 250, noDots: true, maxLabels: 6, money: true });

    document.getElementById("mkt-title").textContent = "Indexed to 100 · common window";

      "Total price return of every added company, indexed to 100 at the start of " +
      "the longest common window. Add more companies to expand the comparison.";
    const tickers = Object.keys(companies);
    const series = [];
    for (const t of tickers) {
      try { const mm = await loadMarket(t);
        if (mm.history && mm.history.length > 10) series.push([t, mm.history]);
      } catch {}
    }

        '<div class="note" style="padding:20px 0">Add another company with market data to compare.</div>';

    const aligned = trimmed.map(([t, h]) => [t, h.slice(h.length - minLen)]);
    lineChart("mkt-chart", yearLabels(aligned[0][1]),
      aligned.map(([t, h], i) => ({ label: t,

        data: h.map(([, px]) => 100 * px / h[0][1]) })),
      false, { height: 250, noDots: true, maxLabels: 6, money: true });
  }
}

function renderCompare() {

  if (tickers.length < 2) {
    view.innerHTML = emptyState("Add at least two companies to compare.");

  const commonFy = Math.min(...tickers.map(t =>
    Math.max(...companies[t].rows.map(r => r.fiscal_year))));
  view.innerHTML = `
    <div class="selrow"><label>Metric</label>
      <select onchange="compareMetric=this.value;render()">

          `<option value="${m}" ${m===compareMetric?"selected":""}>${l}</option>`).join("")}
      </select></div>

      <span class="latest">all years</span></h3>
      <div style="height:250px" id="cmp-chart"></div></div>

      <button class="btn-ghost" onclick="exportCompare(${commonFy})">CSV</button></h2>
    <div class="tablewrap"><table><thead><tr><th>Metric</th>
      ${tickers.map(t => `<th class="num">${t}</th>`).join("")}
    </tr></thead><tbody>
      ${Object.keys(METRICS).map(m => {
        const vals = tickers.map(t => {
          const row = companies[t].rows.find(r => r.fiscal_year === commonFy);
          return row ? row[m] : null;
        });
        const present = vals.filter(v => v != null);
        let best = null;
        if (present.length > 1)
          best = LOWER_BETTER.has(m) ? Math.min(...present) : Math.max(...present);
        return `<tr><td>${METRICS[m]}</td>${vals.map(v =>
          `<td class="num ${v != null && v === best ? "best" : ""}">${fmt(v, m)}</td>`).join("")}</tr>`;
      }).join("")}
    </tbody></table></div>`;
  const allFy = [...new Set(tickers.flatMap(t =>
    companies[t].rows.map(r => r.fiscal_year)))].sort();
  const pct = PCT.has(compareMetric);
  lineChart("cmp-chart", allFy.map(y => String(y).slice(2)),
    tickers.map((t, i) => ({
      label: t, color: i === 0 ? cssVar("--accent") : PALETTE[i % PALETTE.length],
      data: allFy.map(y => {
        const row = companies[t].rows.find(r => r.fiscal_year === y);
        const v = row ? row[compareMetric] : null;
        return v == null ? null : v * (pct ? 100 : 1);
      }),
    })), pct, { height: 250 });
}

];
async function renderScreen() {
  const view = document.getElementById("view-screen");
  if (!screenerData) {
    view.innerHTML = emptyState("Loading screener…");
    try {
      const r = await fetch("screener.json");
      if (!r.ok) throw new Error("screener.json not built yet");
      screenerData = await r.json();
    } catch (e) {
      view.innerHTML = emptyState("Screener unavailable: " + e.message);
      return;
    }
    if (activeTab() !== "screen") return;
  }
  const { key, dir } = screenSort;
  const rows = [...screenerData].sort((a, b) => {
    const av = a[key], bv = b[key];
    if (av == null) return 1;
    if (bv == null) return -1;
    return (av < bv ? -1 : av > bv ? 1 : 0) * -dir;
  });
  const arrow = k => k === key ? (dir === -1 ? " \u25BE" : " \u25B4") : "";
  view.innerHTML = `
    <div class="note" style="margin:0 0 10px">Composite quality score = mean
      percentile across op margin, FCF margin, ROE, revenue growth, leverage
      (inverted), and liquidity over the ${screenerData.length}-company universe.
      Tap a row to open it. <button class="btn-ghost" onclick="exportScreen()">CSV</button></div>
    <div class="tablewrap"><table><thead><tr>
      ${SCREEN_COLS.map(([k, l]) =>
        `<th class="${k==="t"?"":"num"}" style="cursor:pointer"
          onclick="screenSort={key:'${k}',dir:${k===key?-dir:-1}};render()">${l}${arrow(k)}</th>`).join("")}
    </tr></thead><tbody>
      ${rows.map(r => `<tr class="rowlink" onclick="openFromScreen('${r.t}')">
        ${SCREEN_COLS.map(([k,, pct]) => {
          if (k === "t") return `<td><b>${r.t}</b></td>`;
          if (k === "score") {
            const sc = r.score;
            return `<td class="num"><span class="scorebar">
              <i style="width:${sc == null ? 0 : Math.max(4, sc/2)}px"></i>${sc ?? "—"}</span></td>`;
          }
          const v = r[k];
          const txt = v == null ? "—" : pct ? (v*100).toFixed(1) + "%" :
            k === "revenue" ? fmt(v, "revenue") : v.toFixed(2);
          return `<td class="num ${v != null && v < 0 && pct ? "neg" : ""}">${txt}</td>`;
        }).join("")}</tr>`).join("")}
    </tbody></table></div>`;
}
async function openFromScreen(t) {
  if (!companies[t]) {
    try {
      const r = await fetch(`data/${t}.json`);
      if (r.ok) { companies[t] = await r.json(); saveState(); }
    } catch {}
  }
  if (companies[t]) { selected = t; showTab("companies"); }
}
function exportScreen() {
  if (!screenerData) return;
  const header = ["ticker","name","fy","revenue",
    ...Object.keys(screenerData[0] || {}).filter(k =>
      !["t","name","fy","revenue"].includes(k))];
  const body = screenerData.map(r => header.map((k, i) =>
    i === 0 ? r.t : r[k] ?? ""));
  exportCSV("screener.csv", [header, ...body]);
}
window.openFromScreen = openFromScreen; window.exportScreen = exportScreen;

function render() {
  renderChips();
  const tab = activeTab();
  if (tab === "companies") renderCompanies();
  else if (tab === "market") renderMarket();
  else if (tab === "screen") renderScreen();
  else renderCompare();
}
render();
</script>
</body>
</html>
